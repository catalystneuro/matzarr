name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    # continue-on-error for 'latest': newest MATLAB releases may change how
    # save -v7.3 encodes chunks; the indexer self-check surfaces the evidence
    # in this job's log without blocking CI. R2024b is the verified baseline.
    continue-on-error: ${{ matrix.release == 'latest' }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        release: [R2024b]
        include:
          - os: ubuntu-latest
            release: latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: catalystneuro/zarr-matlab
          path: zarr-matlab-dep
      - uses: matlab-actions/setup-matlab@v2
        with:
          release: ${{ matrix.release }}
          cache: true
      - name: Run tests
        uses: matlab-actions/run-command@v2
        with:
          command: >-
            cd(getenv('GITHUB_WORKSPACE'));
            setenv('ZARR_MATLAB_PATH', fullfile(pwd, 'zarr-matlab-dep'));
            run tools/run_tests.m

      - name: Set up Python for the zarr-python cross-check
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install "zarr>=3" numpy fsspec

      - name: Write shim fixture (MATLAB)
        uses: matlab-actions/run-command@v2
        with:
          command: >-
            cd(getenv('GITHUB_WORKSPACE'));
            addpath(pwd, fullfile(pwd, 'tools'), fullfile(pwd, 'zarr-matlab-dep'));
            make_shim_fixture(fullfile(pwd, 'shim_fixture'))

      - name: Verify with zarr-python via kerchunk refs
        run: python tools/shim_kerchunk.py shim_fixture/fixture.mat.zarr
